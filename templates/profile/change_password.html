{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <!-- Sidebar Menu -->
        <div class="col-md-3">
            <div class="list-group">
                <a href="{{ url_for('profile.view_profile') }}" class="list-group-item list-group-item-action">
                    👤 My Profile
                </a>
                <a href="{{ url_for('profile.edit_profile') }}" class="list-group-item list-group-item-action">
                    ✏️ Edit Profile
                </a>
                <a href="{{ url_for('profile.change_password') }}" class="list-group-item list-group-item-action active">
                    🔐 Change Password
                </a>
                <a href="{{ url_for('address.list_addresses') }}" class="list-group-item list-group-item-action">
                    📍 My Addresses
                </a>
                <a href="{{ url_for('order.list_orders') }}" class="list-group-item list-group-item-action">
                    📦 My Orders
                </a>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="col-md-9">
            <div class="card">
                <div class="card-header">
                    <h3>🔐 Change Password</h3>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="current_password" class="form-label">Current Password *</label>
                            <input type="password" class="form-control" id="current_password" name="current_password" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="new_password" class="form-label">New Password *</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" minlength="6" required>
                            <small class="text-muted">Minimum 6 characters</small>
                        </div>
                        
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm New Password *</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" minlength="6" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Change Password</button>
                        <a href="{{ url_for('profile.view_profile') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
