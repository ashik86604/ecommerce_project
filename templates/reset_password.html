<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.card{
background:white;
padding:40px;
width:360px;
border-radius:14px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn .5s ease;
}

.card h3{
margin-bottom:10px;
font-weight:600;
color:#333;
}

.subtitle{
font-size:14px;
color:#777;
margin-bottom:25px;
}

.form-group{
text-align:left;
margin-bottom:20px;
}

label{
font-size:14px;
color:#444;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
transition:all .3s;
font-size:14px;
}

input:focus{
border-color:#2575fc;
box-shadow:0 0 0 3px rgba(37,117,252,0.15);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#28a745,#20c997);
color:white;
font-size:15px;
font-weight:500;
cursor:pointer;
transition:all .3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.back{
margin-top:15px;
font-size:13px;
}

.back a{
color:#2575fc;
text-decoration:none;
font-weight:500;
}

.back a:hover{
text-decoration:underline;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="card">

<h3>Reset Password</h3>
<p class="subtitle">Create a new secure password</p>

<form method="POST">

<div class="form-group">
<label>New Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<button class="btn btn-success mt-3">
Update Password
</button>

</form>

<div class="back">
<a href="login.html">← Back to Login</a>
</div>

</div>

</body>
</html>
