{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>Add New Address</h1>
    
    <form method="POST" class="mt-4">
        <div class="card">
            <div class="card-body">
                <!-- Address Type -->
                <div class="mb-3">
                    <label for="address_type" class="form-label">Address Type *</label>
                    <select class="form-select" id="address_type" name="address_type" required>
                        <option value="home">Home</option>
                        <option value="work">Work</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <!-- Street Address -->
                <div class="mb-3">
                    <label for="street_address" class="form-label">Street Address *</label>
                    <input type="text" class="form-control" id="street_address" name="street_address" required>
                </div>
                
                <!-- City -->
                <div class="mb-3">
                    <label for="city" class="form-label">City *</label>
                    <input type="text" class="form-control" id="city" name="city" required>
                </div>
                
                <!-- State -->
                <div class="mb-3">
                    <label for="state" class="form-label">State *</label>
                    <input type="text" class="form-control" id="state" name="state" required>
                </div>
                
                <!-- Postal Code -->
                <div class="mb-3">
                    <label for="postal_code" class="form-label">Postal Code *</label>
                    <input type="text" class="form-control" id="postal_code" name="postal_code" required>
                </div>
                
                <!-- Phone -->
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number *</label>
                    <input type="tel" class="form-control" id="phone" name="phone" required>
                </div>
                
                <!-- Set as Default -->
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="is_default" name="is_default">
                        <label class="form-check-label" for="is_default">
                            Set as default address
                        </label>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-3">
            <button type="submit" class="btn btn-primary btn-lg">Save Address</button>
            <a href="{{ url_for('address.list_addresses') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
