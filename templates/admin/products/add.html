{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>Add New Product</h1>
    
    <form method="POST" enctype="multipart/form-data" class="mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <!-- Product Name -->
                        <div class="mb-3">
                            <label for="product_name" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="product_name" name="product_name" required>
                        </div>
                        
                        <!-- Category -->
                        <div class="mb-3">
                            <label for="category_id" class="form-label">Category *</label>
                            <select class="form-select" id="category_id" name="category_id" required>
                                <option value="">Select Category</option>
                                {% for cat in categories %}
                                    <option value="{{ cat.category_id }}">{{ cat.category_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="5"></textarea>
                        </div>
                        
                        <!-- SKU -->
                        <div class="mb-3">
                            <label for="sku" class="form-label">SKU (Stock Keeping Unit)</label>
                            <input type="text" class="form-control" id="sku" name="sku">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <!-- Price -->
                        <div class="mb-3">
                            <label for="price" class="form-label">Price (₹) *</label>
                            <input type="number" class="form-control" id="price" name="price" step="0.01" required>
                        </div>
                        
                        <!-- Discount Price -->
                        <div class="mb-3">
                            <label for="discount_price" class="form-label">Discount Price (₹)</label>
                            <input type="number" class="form-control" id="discount_price" name="discount_price" step="0.01">
                        </div>
                        
                        <!-- Stock Quantity -->
                        <div class="mb-3">
                            <label for="stock_quantity" class="form-label">Stock Quantity *</label>
                            <input type="number" class="form-control" id="stock_quantity" name="stock_quantity" required>
                        </div>
                        
                        <!-- Images -->
                        <div class="mb-3">
                            <label for="product_images" class="form-label">Product Images * (Min 1)</label>
                            <input type="file" class="form-control" id="product_images" name="product_images" multiple accept="image/*" required>
                            <small class="text-muted">First image will be the primary image</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-3">
            <button type="submit" class="btn btn-primary btn-lg">Add Product</button>
            <a href="{{ url_for('admin.product_list') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
