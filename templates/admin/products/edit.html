{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>Edit Product</h1>
    
    <form method="POST" enctype="multipart/form-data" class="mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <!-- Product Name -->
                        <div class="mb-3">
                            <label for="product_name" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="product_name" name="product_name" value="{{ product.product_name }}" required>
                        </div>
                        
                        <!-- Category -->
                        <div class="mb-3">
                            <label for="category_id" class="form-label">Category *</label>
                            <select class="form-select" id="category_id" name="category_id" required>
                                {% for cat in categories %}
                                    <option value="{{ cat.category_id }}" {% if cat.category_id == product.category_id %}selected{% endif %}>
                                        {{ cat.category_name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="5">{{ product.description }}</textarea>
                        </div>
                        
                        <!-- SKU -->
                        <div class="mb-3">
                            <label for="sku" class="form-label">SKU</label>
                            <input type="text" class="form-control" id="sku" name="sku" value="{{ product.sku or '' }}">
                        </div>
                        
                        <!-- Is Active -->
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if product.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="is_active">
                                    Active
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <!-- Price -->
                        <div class="mb-3">
                            <label for="price" class="form-label">Price (₹) *</label>
                            <input type="number" class="form-control" id="price" name="price" step="0.01" value="{{ product.price }}" required>
                        </div>
                        
                        <!-- Discount Price -->
                        <div class="mb-3">
                            <label for="discount_price" class="form-label">Discount Price (₹)</label>
                            <input type="number" class="form-control" id="discount_price" name="discount_price" step="0.01" value="{{ product.discount_price or '' }}">
                        </div>
                        
                        <!-- Stock Quantity -->
                        <div class="mb-3">
                            <label for="stock_quantity" class="form-label">Stock Quantity *</label>
                            <input type="number" class="form-control" id="stock_quantity" name="stock_quantity" value="{{ product.stock_quantity }}" required>
                        </div>
                        
                        <!-- Current Images -->
                        {% if images %}
                        <div class="mb-3">
                            <label class="form-label">Current Images</label>
                            <div class="row">
                                {% for image in images %}
                                <div class="col-6 mb-2">
                                    <img src="{{ image.image_url }}" class="img-thumbnail" style="width: 100%; height: 100px; object-fit: cover;">
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                        {% endif %}
                        
                        <!-- Add More Images -->
                        <div class="mb-3">
                            <label for="product_images" class="form-label">Add More Images</label>
                            <input type="file" class="form-control" id="product_images" name="product_images" multiple accept="image/*">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-3">
            <button type="submit" class="btn btn-primary btn-lg">Update Product</button>
            <a href="{{ url_for('admin.product_list') }}" class="btn btn-secondary btn-lg">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
